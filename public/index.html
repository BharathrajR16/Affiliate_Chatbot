<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopBot - Best Deals Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #ffffff15;
    }

    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; color: #f0a500; }
    header p { font-size: 12px; color: #aaa; }

    .chat-container {
      width: 100%;
      max-width: 800px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .welcome { text-align: center; padding: 40px 20px; }
    .welcome h2 { font-size: 24px; color: #f0a500; margin-bottom: 10px; }
    .welcome p { color: #aaa; font-size: 14px; margin-bottom: 24px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .suggestion-btn {
      background: #1a1a2e;
      border: 1px solid #f0a50050;
      color: #f0a500;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .suggestion-btn:hover { background: #f0a500; color: #000; }

    .message { display: flex; gap: 10px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .avatar.bot { background: #f0a50020; }
    .avatar.user { background: #4f46e520; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.bot .bubble {
      background: #1a1a2e;
      border: 1px solid #ffffff10;
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: #4f46e5;
      border-top-right-radius: 4px;
    }

    .products-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .product-card {
      background: #16213e;
      border: 1px solid #ffffff15;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .product-card:hover { border-color: #f0a50060; }

    .product-info { flex: 1; }
    .product-rank { font-size: 11px; color: #f0a500; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .product-name { font-size: 15px; font-weight: 600; margin: 4px 0; color: #fff; }
    .product-price { font-size: 16px; font-weight: 700; color: #4ade80; }
    .product-rating { font-size: 12px; color: #aaa; margin-top: 4px; }
    .product-reason { font-size: 12px; color: #888; margin-top: 6px; font-style: italic; }

    .buy-btn {
      background: linear-gradient(135deg, #f0a500, #ff6b00);
      color: #000;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .buy-btn:hover { opacity: 0.85; }

    .typing {
      display: flex; gap: 6px; align-items: center;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 16px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 8px; height: 8px;
      background: #f0a500;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .source-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .source-live { background: #4ade8020; color: #4ade80; border: 1px solid #4ade8040; }
    .source-cache { background: #f0a50020; color: #f0a500; border: 1px solid #f0a50040; }
    .source-fallback { background: #ffffff10; color: #aaa; border: 1px solid #ffffff20; }

    .input-area {
      width: 100%; max-width: 800px;
      padding: 16px;
      background: #1a1a2e;
      border-top: 1px solid #ffffff10;
      display: flex; gap: 10px;
    }

    input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #ffffff20;
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #f0a500; }
    input::placeholder { color: #555; }

    button#sendBtn {
      background: linear-gradient(135deg, #f0a500, #ff6b00);
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button#sendBtn:hover { opacity: 0.85; }
    button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🛍️</div>
  <div>
    <h1>ShopBot</h1>
    <p>AI-Powered Product Finder · Best Deals on Amazon</p>
  </div>
</header>

<div class="chat-container" id="chat">
  <div class="welcome">
    <h2>Find the Best Products! 🔥</h2>
    <p>Ask me anything in natural language — I'll find top-rated products with best prices!</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this.innerText)">Good earbuds for gym under 1500</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.innerText)">Best phone under 15000</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.innerText)">Smartwatch under 1000</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.innerText)">Laptop for college under 40000</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this.innerText)">Running shoes under 2000</button>
    </div>
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask me anything... e.g. good earbuds for gym under 1500"/>
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
  const API_URL = '/api/chat';
  const chat = document.getElementById("chat");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  function sendSuggestion(text) {
    input.value = text;
    sendMessage();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  function addMessage(role, content) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    const avatar = role === "bot" ? "🤖" : "👤";
    div.innerHTML = `
      <div class="avatar ${role}">${avatar}</div>
      <div class="bubble">${content}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing";
    div.innerHTML = `
      <div class="avatar bot">🤖</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function getSourceBadge(source) {
    if (source === "live") return `<span class="source-badge source-live">🟢 Live</span>`;
    if (source === "cache") return `<span class="source-badge source-cache">⚡ Cached</span>`;
    return `<span class="source-badge source-fallback">📦 Curated</span>`;
  }

  function renderProducts(products, source) {
    const grid = document.createElement("div");
    grid.className = "products-grid";

    products.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-info">
          <div class="product-rank">#${i + 1} Pick</div>
          <div class="product-name">${escapeHtml(p.name)}</div>
          <div class="product-price">${escapeHtml(p.price)}</div>
          <div class="product-rating">⭐ ${escapeHtml(p.rating)} · ${escapeHtml(p.reviews)}</div>
          <div class="product-reason">${escapeHtml(p.reason)}</div>
        </div>
        <a href="${p.link}" target="_blank" rel="noopener" class="buy-btn">
          Buy on Amazon ➤
        </a>
      `;
      grid.appendChild(card);
    });

    const wrapper = document.createElement("div");
    wrapper.className = "message bot";
    wrapper.innerHTML = `<div class="avatar bot">🤖</div>`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.maxWidth = "100%";
    bubble.style.padding = "12px";
    bubble.appendChild(grid);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();

      if (data.products && data.products.length > 0) {
        const badge = getSourceBadge(data.source);
        addMessage("bot", `Top picks for <strong>"${escapeHtml(text)}"</strong> ${badge}`);
        renderProducts(data.products, data.source);
        if (data.note) {
          addMessage("bot", `ℹ️ ${data.note}`);
        }
      } else {
        addMessage("bot", "Sorry, I couldn't find products for that. Try rephrasing! 🙏");
      }

    } catch (err) {
      removeTyping();
      console.error('Error:', err);
      addMessage("bot", "❌ Server error. Make sure the backend is running!\n\nRun: <code>python main.py</code>");
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
